{% extends 'includes/base.html' %}
{% block title %}Too Many Requests{% endblock %}

{% block content %}
<div class="flex flex-col items-center justify-center">
    <div class="bg-white p-8 rounded-lg shadow-md text-center space-y-6">
        <h1 class="text-2xl font-bold text-red-600">403 - Too Many Requests</h1>
        <p class="mt-4 text-gray-700">
            You've hit the request limit. Please wait a few minutes before trying again.
        </p>
        <a href="/" class="cursor-pointer bg-black text-white active:bg-slate-600 text-sm font-bold uppercase px-6 py-3 rounded shadow hover:shadow-lg outline-none focus:outline-none mr-1 mb-1 ease-linear transition-all duration-150">
            Back to Home
        </a>
    </div>
</div>
{% endblock %}
