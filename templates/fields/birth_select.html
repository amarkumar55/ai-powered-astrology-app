{% load custom_filters %}
<div class="relative w-full mb-3">
    <label class="block text-slate-600 text-xs font-bold mb-2" for="{{name}}">   
        <span class="block text-sm font-medium text-gray-700 mb-1">
            {{ label|capfirst }}<span class="text-red-500">*</span>
        </span>
        <select 
            required 
            name="{{name}}" 
            id="{{name}}"
            data-parsley-trigger="keyup"  
            data-parsley-required-message="Please select valid option."
            class="bg-white border-0 px-3 py-3 placeholder-slate-300 text-slate-600 rounded text-sm shadow focus:outline-none focus:ring w-full ease-linear transition-all duration-150">
            {% if type == 'month' %}
                {% for key, val in item.items %}
                <option value="{{key}}" {% if value == key %} selected {% endif %} >{{ val }}</option>
                {% endfor %}
            {% else %}
                {% if dataype == 'string' %}
                    {% for i in item %}
                       <option value="{{i}}" {% if value == i %} selected {% endif %}>{{ i }}</option>
                    {% endfor %}
                {% else %}
                    {% for i in item %}
                            <option value="{{i}}" {% if value == i|to_int %} selected {% endif %}>{{ i }}</option>
                    {% endfor %}
                {% endif %}
            {% endif %}
        </select>
      
        {% if form.errors %}
        {% with form.errors|get_item:name as field_errors %}
        {% if field_errors %}
            <p class="backend-error-message text-sm text-red-600 mt-1">{{ field_errors.0 }}</p>
        {% endif %}
        {% endwith %}
        {% endif %}
    </label>
</div>
