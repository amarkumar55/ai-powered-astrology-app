{% load custom_filters %}
<div class="relative w-full mb-3">
    <label class="block uppercase text-slate-600 text-xs font-bold mb-2" for="otp">{{label}}<sup class="text-red-500">*</sup></label>
    <input type="text" 
        id="{{name}}" 
        required 
        name="{{name}}" 
        pattern="[0-9]{6}" 
        data-parsley-required-message="OTP is required."
        data-parsley-customotp 
        data-parsley-customotp-message="OTP must be a 6-digit number."
        class="border-0 px-3 py-3 placeholder-slate-300 text-slate-600 bg-white rounded text-sm shadow focus:outline-none focus:ring w-full ease-linear transition-all duration-150"
        placeholder="Enter OTP" />
   
    {% if form.errors %}
        {% with form.errors|get_item:name as field_errors %}
            {% if field_errors %}
            <p class="backend-error-message text-sm text-red-600 mt-1">{{ field_errors.0 }}</p>
            {% endif %}
        {% endwith %}
    {% endif %}
</div>
