{% load custom_filters %}
<div class="relative w-full mb-4">
    <label class="block uppercase text-slate-600 text-xs font-bold mb-2" for="gender">
        Gender <sup class="text-red-500">*</sup>
    </label>
    <select 
        name="gender"
        id="gender" 
        data-parsley-required-message="Please select your gender." 
        required
        class="border-0 px-3 py-3 placeholder-slate-300 text-slate-600 bg-white rounded text-sm shadow focus:outline-none focus:ring w-full ease-linear transition-all duration-150">
        <option value="Male" {% if value == 'Male' %} selected {% endif %}>Male</option>
        <option value="Female" {% if value == 'Female' %} selected {% endif %}>Female</option>
        <option value="Other" {% if value == 'Other' %} selected {% endif %}>Other</option>
    </select>
    {% if form.errors.gender %}
       <p class="text-sm text-red-600 mt-1">{{ form.errors.gender.0 }}</p>
    {% endif %}
</div>
