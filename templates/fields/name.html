{% load custom_filters %}
<div class="relative w-full mb-3">
    <label class="block uppercase text-slate-600 text-xs font-bold mb-2" for="{{name}}">
        {{label}} <sup class="text-red-500">*</sup>  
    </label>
    <input type="text" 
        name="{{name}}" id="{{name}}" 
        value="{{value}}"
        required 
        placeholder="{{label}}"
        {% if disabled %} readonly {% endif %}
        class="border-0 px-3 py-3 placeholder-slate-300 text-slate-600  {% if disabled %} bg-gray-50 {% else %}  bg-white {% endif %} rounded text-sm shadow focus:outline-none focus:ring w-full ease-linear transition-all duration-150"
        data-parsley-customname
        data-parsley-required-message="Name is required."
        data-parsley-customname-message="Please enter a valid name (only letters)." />

    {% with form.errors|get_item:name as field_errors %}
        {% if field_errors %}
        <p class="text-sm text-red-600 mt-1">{{ field_errors.0 }}</p>
        {% endif %}
    {% endwith %}
</div>
