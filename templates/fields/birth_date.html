{% load custom_filters %}
<div class="relative w-full mb-4">
    <label class="block uppercase text-slate-600 text-xs font-bold mb-2" for="birth_date">
        Date of Birth <sup class="text-red-500">*</sup>
    </label>
    <input type="date" 
        name="birth_date" 
        required 
        placeholder="Birth Date" 
        id="birth_date"
        class="border-0 px-3 py-3 placeholder-slate-300 text-slate-600 bg-white rounded text-sm shadow focus:outline-none focus:ring w-full ease-linear transition-all duration-150"
        data-parsley-notfuturedate 
        data-parsley-required-message="Birth date is required."
        data-parsley-notfuturedate-message="Birth date cannot be in the future." />
    
    {% if form.errors.birth_date %}
        <p class="text-sm text-red-600 mt-1">{{form.errors.birth_date.0}}</p>
    {% endif %}  
</div>
