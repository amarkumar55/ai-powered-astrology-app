{% load custom_filters %}
<div class="relative w-full mb-5">
    <label class="block text-slate-600 text-xs font-bold mb-2" for="{{name}}">
        <span class="block text-sm font-medium text-gray-700 mb-1">
            {{ label|capfirst }}<span class="text-red-500">*</span>
        </span>

        <input 
            type="password" 
            required name="{{ name }}" 
            placeholder="••••••••" 
            data-parsley-custompassword
            data-parsley-trigger="keyup" 
            data-parsley-required-message="Password is required."
            class="border-0 px-3 py-3 placeholder-slate-300 text-slate-600 bg-white rounded text-sm shadow focus:outline-none focus:ring w-full ease-linear transition-all duration-150"/>

        {% with form.errors|get_item:name as field_errors %}
            {% if field_errors %}
            <p class="text-sm text-red-600 mt-2">{{ field_errors.0 }}</p>
            {% endif %}
        {% endwith %}

        {% if show_rules %}
            <h4 class="mt-4 mb-2 text-md font-semibold text-gray-900 dark:text-white">Password requirements:</h4>
            <ul class="w-full space-y-1 text-sm text-gray-500 list-disc list-inside dark:text-gray-400">
                <li>Your password can’t be too similar to your other personal information.</li>
                <li>Your password must contain at least 8 characters.</li>
                <li>Your password can’t be a commonly used password.</li>
                <li>Your password can’t be entirely numeric.</li>
            </ul>
        {% endif %}
    </label>    
</div>
