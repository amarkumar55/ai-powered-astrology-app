{% extends "includes/base.html" %}
{% block title %} Dashboard | Password Changed {% endblock %}
{% block content %}
<main >
    <div class="mx-auto max-w-7xl px-2 sm:px-6 lg:px-8">
        <div class="relative flex flex-col lg:flex-row gap-4 h-auto items-center justify-between p-4">
            <div class="md:flex w-full">
                {% include 'dashboard/sidebar.html' %}
                <div
                    class="w-full space-y-4 px-6 shadow-blue-100 hover:shadow-lg hover:shadow-blue-500 text-medium rounded-lg">
                    <div class="p-8 rounded">
                        <h2 class="text-2xl font-bold mb-4 text-gray-700">Password Changed Successfully</h2>
                        <p class="text-gray-700">Your password has been updated. You can now use your new password to log in.</p>
                        <a href="{% url 'dashboard.index' %}"
                            class="inline-block mt-6 bg-gray-700 text-white px-4 py-2 rounded hover:bg-blue-700 transition">
                            Go to Dashboard
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
{% endblock %}
