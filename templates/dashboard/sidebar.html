<ul class="hidden md:block w-64 flex-column space-y-3 text-sm font-medium text-gray-500 dark:text-gray-400 md:me-4 mb-4 md:mb-0">
    <li class="px-2">
        <a href="{% url 'dashboard.index' %}"
            class="inline-flex items-center gap-3 px-4 py-4 text-white bg-gradient-to-r from-purple-600 to-indigo-600 rounded-xl active w-full shadow-lg hover:shadow-xl transition-all duration-300"

                <circle cx="12" cy="7" r="4"></circle>

    <li class="px-2">

            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">

            </svg>
            Your Activity
        </a>
    </li>
    <li class="px-2">
        <a href="{% url 'dashboard.get_payment_history' %}"
            class="inline-flex items-center gap-3 px-4 py-4 rounded-xl hover:text-gray-900 bg-white hover:bg-gray-50 w-full shadow-sm hover:shadow-md transition-all duration-300 border border-gray-100">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
                <rect x="2" y="5" width="20" height="14" rx="2" ry="2"></rect>
                <line x1="2" y1="10" x2="22" y2="10"></line>
                <path d="M7 15h.01"></path>
                <path d="M11 15h2"></path>
            </svg>
            Payment History
        </a>

    <li class="px-2">
        <a href="{% url 'dashboard.get_refund_history' %}"

                <path d="M11 15h2"></path>

        </a>

    <li class="px-2">

                <path

                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                    <polyline points="16 17 21 12 16 7" />
                    <line x1="21" y1="12" x2="9" y2="12" />
