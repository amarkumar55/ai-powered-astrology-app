{% extends "includes/base.html" %}
{% block title %}Today Horoscope Predition{% endblock %}
{% block content %}

<div class="mx-auto max-w-7xl px-2 py-10 sm:px-6 lg:px-8">


    <div class="mx-auto max-w-7xl px-6 py-8">
        <div class="text-center mb-6">
            <h2 class="text-4xl font-bold text-gray-800 dark:text-white">✨Today Horoscope Prediction For You ✨</h2>
        </div>

        <div class="max-w-3xl mx-auto bg-white dark:bg-gray-800 rounded-xl shadow-lg p-8">
            <div class="grid grid-cols-1 sm:grid-cols-1 lg:grid-cols-1 gap-4">
                <div
                    class="bg-blue-50 dark:bg-gray-700 p-4 rounded-lg shadow-md hover:shadow-lg transition-transform transform hover:scale-105">
                    <h3>Today Horoscope</h3>
                    <dl class="mt-4 w-full text-gray-900 divide-y divide-gray-200 dark:text-white dark:divide-gray-700">
                      
                        {% for horoscope in horoscopes %}
                        <div class="flex flex-col pb-3">
                            <dt class="mb-1 text-gray-500 md:text-lg dark:text-gray-400">{{ horoscope.sign }}</dt>
                            <dd class="text-lg font-semibold">{{ horoscope.prediction }}</dd>
                        </div>
                        {% endfor %}
                    </dl>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
