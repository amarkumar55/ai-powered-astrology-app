{% extends 'chat/base_chat.html' %}

{% block title %}Insufficient Balance - Video Call{% endblock %}

{% block chat_content %}
<div class="alert alert-danger text-center mt-5">
    <h2>Insufficient Balance</h2>
    <p>Your wallet balance is ₹{{ balance }}. You need at least ₹{{ required }} to start a video call.</p>
    <a href="/wallet/topup/" class="btn btn-primary mt-3">Add Money to Wallet</a>
</div>
{% endblock %}
